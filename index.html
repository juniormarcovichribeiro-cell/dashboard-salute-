<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Comercial — Setor Vendas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --border: #e2e4e9;
    --text: #1a1d23;
    --muted: #6b7280;
    --hint: #9ca3af;
    --green: #1D9E75;
    --green-bg: #e1f5ee;
    --amber: #BA7517;
    --amber-bg: #faeeda;
    --red: #E24B4A;
    --red-bg: #fcebeb;
    --blue: #185FA5;
    --blue-bg: #e6f1fb;
    --purple: #534AB7;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: 700; }
  .header-title { font-size: 16px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* STATUS */
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--hint); display: inline-block; margin-right: 4px; }
  .status-dot.ok { background: var(--green); }
  .status-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-text { font-size: 12px; color: var(--muted); }

  /* CONTROLS */
  select, button {
    font-size: 13px;
    padding: 7px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  select:focus, button:focus { border-color: var(--blue); }
  .btn-refresh {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }
  .btn-refresh:hover { opacity: 0.9; }
  .btn-refresh svg { width: 14px; height: 14px; }

  /* MAIN */
  .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .metric-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .metric-value { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .metric-sub { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .metric-badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-red { background: var(--red-bg); color: var(--red); }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    overflow: hidden;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
  }
  .chart-wrap { position: relative; width: 100%; }

  /* TABLE */
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 10px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9fafb; }

  .bar-wrap { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 5px; background: #f0f1f3; border-radius: 3px; overflow: hidden; min-width: 60px; }
  .bar-fill { height: 100%; border-radius: 3px; background: var(--blue); }

  /* RANK # */
  .rank { font-size: 12px; color: var(--hint); font-weight: 600; width: 20px; }
  .rank-1 { color: #BA7517; }
  .rank-2 { color: #6b7280; }
  .rank-3 { color: #9C6B3C; }

  /* LOADING */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--muted); }

  /* ERROR */
  .error-box {
    background: var(--red-bg);
    border: 1px solid #f09595;
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    color: var(--red);
    font-size: 14px;
    margin: 40px auto;
    max-width: 500px;
  }

  /* LAST UPDATE */
  .last-update { font-size: 11px; color: var(--hint); text-align: right; margin-bottom: 10px; }

  /* MOTIVO LISTA */
  .motivo-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .motivo-row:last-child { border-bottom: none; }
  .motivo-label { flex: 1; font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .motivo-count { font-size: 12px; font-weight: 600; color: var(--text); min-width: 40px; text-align: right; }
  .motivo-pct { font-size: 11px; color: var(--muted); min-width: 36px; text-align: right; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <div>
      <div class="header-title">Dashboard Comercial — Salute</div>
      <div class="header-sub">Setor | Vendas</div>
    </div>
  </div>
  <div class="header-right">
    <span><span class="status-dot loading" id="statusDot"></span><span class="status-text" id="statusText">Carregando...</span></span>
    <select id="filtroVendedor" onchange="renderAll()"><option value="">Todos os vendedores</option></select>
    <select id="filtroPeriodo" onchange="renderAll()">
      <option value="7">Últimos 7 dias</option>
      <option value="15">Últimos 15 dias</option>
      <option value="30" selected>Últimos 30 dias</option>
      <option value="0">Todo o período</option>
    </select>
    <button class="btn-refresh" onclick="carregarDados()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
      Atualizar
    </button>
  </div>
</div>

<div class="main">
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Conectando ao Google Sheets...</div>
  </div>

  <div id="dashContent" style="display:none;">
    <div class="last-update" id="lastUpdate"></div>

    <div class="metrics" id="metricsGrid"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Ranking de vendedores — atendimentos</div>
        <div class="table-scroll"><table id="rankingTable"></table></div>
      </div>
      <div class="card">
        <div class="card-title">Motivos de finalização</div>
        <div id="motivosLista"></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title">Taxa de conversão por vendedor (top 10)</div>
        <div class="chart-wrap" style="height:280px;"><canvas id="convChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Volume de atendimentos por dia</div>
        <div class="chart-wrap" style="height:280px;"><canvas id="volChart"></canvas></div>
      </div>
    </div>

    <div class="card" style="margin-bottom:16px;">
      <div class="card-title">Card no CRM — distribuição por etapa</div>
      <div class="chart-wrap" style="height:220px;"><canvas id="crmChart"></canvas></div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '11kR5ru6AzOO7INRYsj22xw8ONfXWVEKeCUcFxtUuPss';
const GID = '1498535428';
const COLS = {
  ATENDENTE: 15,
  FILA: 11,
  MOTIVO: 19,
  CARD: 14,
  DATA_ATRIBUIDO: 13,
  VALOR: 18,
};

let rawData = [];
let charts = {};

async function carregarDados() {
  setStatus('loading', 'Carregando...');
  document.getElementById('loadingScreen').style.display = 'flex';
  document.getElementById('dashContent').style.display = 'none';

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    const linhas = parsearCSV(csv);
    if (linhas.length < 2) throw new Error('Sem dados');

    const cabecalho = linhas[0];
    rawData = linhas.slice(1).filter(l => l.some(c => (c||'').trim() !== ''));

    // Popular filtro de vendedores
    const vendedores = [...new Set(rawData.map(r => r[COLS.ATENDENTE]).filter(Boolean))].sort();
    const sel = document.getElementById('filtroVendedor');
    const atual = sel.value;
    sel.innerHTML = '<option value="">Todos os vendedores</option>' +
      vendedores.map(v => `<option value="${v}"${v===atual?' selected':''}>${v}</option>`).join('');

    document.getElementById('lastUpdate').textContent =
      'Última atualização: ' + new Date().toLocaleString('pt-BR');

    setStatus('ok', rawData.length.toLocaleString('pt-BR') + ' registros carregados');
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('dashContent').style.display = 'block';
    renderAll();

  } catch(e) {
    setStatus('error', 'Erro: ' + e.message);
    document.getElementById('loadingScreen').innerHTML = `
      <div class="error-box">
        <strong>Erro ao carregar dados</strong><br><br>
        ${e.message}<br><br>
        <small>Verifique se a planilha está compartilhada publicamente (Qualquer pessoa com o link).</small><br><br>
        <button onclick="carregarDados()" style="margin-top:8px;">Tentar novamente</button>
      </div>`;
  }
}

function getFiltrado() {
  const vendedor = document.getElementById('filtroVendedor').value;
  const dias = parseInt(document.getElementById('filtroPeriodo').value);
  const corte = dias > 0 ? new Date(Date.now() - dias * 86400000) : null;

  return rawData.filter(r => {
    if (vendedor && r[COLS.ATENDENTE] !== vendedor) return false;
    if (corte) {
      const d = parseData(r[COLS.DATA_ATRIBUIDO]);
      if (d && d < corte) return false;
    }
    return true;
  });
}

function parseData(str) {
  if (!str) return null;
  const m = str.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function renderAll() {
  const data = getFiltrado();
  renderMetrics(data);
  renderRanking(data);
  renderMotivos(data);
  renderConversao(data);
  renderVolume(data);
  renderCRM(data);
}

function renderMetrics(data) {
  const total = data.length;
  const agendados = data.filter(r => (r[COLS.MOTIVO]||'').includes('Agendamento Realizado')).length;
  const perdidos = data.filter(r =>
    (r[COLS.MOTIVO]||'').includes('Falta de Comunicação') ||
    (r[COLS.MOTIVO]||'').includes('Negociação Abandonada')).length;
  const comValor = data.filter(r => r[COLS.VALOR] && parseFloat(r[COLS.VALOR]) > 0);
  const totalValor = comValor.reduce((s,r) => s + parseFloat(r[COLS.VALOR]), 0);
  const conv = total > 0 ? (agendados/total*100).toFixed(1) : 0;
  const vendAtivos = new Set(data.map(r => r[COLS.ATENDENTE]).filter(Boolean)).size;

  const badgeConv = conv >= 20 ? 'badge-green' : conv >= 10 ? 'badge-amber' : 'badge-red';

  document.getElementById('metricsGrid').innerHTML = `
    <div class="metric">
      <div class="metric-label">Atendimentos</div>
      <div class="metric-value">${total.toLocaleString('pt-BR')}</div>
      <div class="metric-sub">${vendAtivos} vendedor${vendAtivos!==1?'es':''} ativo${vendAtivos!==1?'s':''}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Agendamentos</div>
      <div class="metric-value">${agendados.toLocaleString('pt-BR')}</div>
      <span class="metric-badge ${badgeConv}">Conv. ${conv}%</span>
    </div>
    <div class="metric">
      <div class="metric-label">Negócios perdidos</div>
      <div class="metric-value">${perdidos.toLocaleString('pt-BR')}</div>
      <div class="metric-sub">${total>0?(perdidos/total*100).toFixed(1):0}% do total</div>
    </div>
    <div class="metric">
      <div class="metric-label">Valor em cards (R$)</div>
      <div class="metric-value">R$ ${Math.round(totalValor).toLocaleString('pt-BR')}</div>
      <div class="metric-sub">${comValor.length} cards com valor</div>
    </div>
  `;
}

function renderRanking(data) {
  const map = {};
  data.forEach(r => {
    const v = r[COLS.ATENDENTE]; if (!v) return;
    if (!map[v]) map[v] = { total:0, agend:0 };
    map[v].total++;
    if ((r[COLS.MOTIVO]||'').includes('Agendamento Realizado')) map[v].agend++;
  });
  const sorted = Object.entries(map).sort((a,b) => b[1].total - a[1].total).slice(0, 15);
  const max = sorted[0]?.[1]?.total || 1;

  const rows = sorted.map(([v, s], i) => {
    const conv = s.total > 0 ? (s.agend/s.total*100).toFixed(0) : 0;
    const badge = conv >= 20 ? 'badge-green' : conv >= 10 ? 'badge-amber' : 'badge-red';
    const rankClass = i === 0 ? 'rank rank-1' : i === 1 ? 'rank rank-2' : i === 2 ? 'rank rank-3' : 'rank';
    return `<tr>
      <td><span class="${rankClass}">${i+1}</span></td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${v}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(s.total/max*100)}%"></div></div>
          <span style="font-size:12px;min-width:36px;text-align:right;">${s.total}</span>
        </div>
      </td>
      <td><span class="metric-badge ${badge}" style="font-size:11px;">${conv}%</span></td>
      <td style="font-size:12px;color:var(--muted);">${s.agend} agend.</td>
    </tr>`;
  }).join('');

  document.getElementById('rankingTable').innerHTML = `
    <thead><tr>
      <th>#</th><th>Vendedor</th><th>Atendimentos</th><th>Conv.</th><th>Agend.</th>
    </tr></thead>
    <tbody>${rows}</tbody>`;
}

function renderMotivos(data) {
  const map = {};
  data.forEach(r => {
    const m = (r[COLS.MOTIVO]||'').trim();
    if (!m || m === 'N/A') return;
    map[m] = (map[m]||0) + 1;
  });
  const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,8);
  const total = sorted.reduce((s,[,v]) => s+v, 0);

  const colors = ['#185FA5','#1D9E75','#E24B4A','#BA7517','#534AB7','#D85A30','#6b7280','#D4537E'];

  document.getElementById('motivosLista').innerHTML = sorted.map(([m, n], i) => {
    const pct = total > 0 ? (n/total*100).toFixed(0) : 0;
    const label = m.replace(/^[✅❌ℹ️🔄⚠️]/u,'').trim();
    return `<div class="motivo-row">
      <div style="width:10px;height:10px;border-radius:2px;background:${colors[i%colors.length]};flex-shrink:0;"></div>
      <div class="motivo-label" title="${label}">${label}</div>
      <div class="motivo-count">${n.toLocaleString('pt-BR')}</div>
      <div class="motivo-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function renderConversao(data) {
  const map = {};
  data.forEach(r => {
    const v = r[COLS.ATENDENTE]; if (!v) return;
    if (!map[v]) map[v] = { total:0, agend:0 };
    map[v].total++;
    if ((r[COLS.MOTIVO]||'').includes('Agendamento Realizado')) map[v].agend++;
  });
  const sorted = Object.entries(map)
    .filter(([,s]) => s.total >= 5)
    .map(([v,s]) => ({ v, conv: s.total>0 ? parseFloat((s.agend/s.total*100).toFixed(1)) : 0 }))
    .sort((a,b) => b.conv-a.conv).slice(0,10);

  const labels = sorted.map(s => s.v.split(' ')[0]);
  const vals = sorted.map(s => s.conv);
  const colors = vals.map(v => v >= 20 ? '#1D9E75' : v >= 10 ? '#BA7517' : '#E24B4A');

  if (charts.conv) charts.conv.destroy();
  charts.conv = new Chart(document.getElementById('convChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: vals, backgroundColor: colors, borderRadius: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, max: 100, ticks: { callback: v => v+'%', font:{size:11} }, grid: { color: '#f0f1f3' } },
        x: { ticks: { font:{size:11} }, grid: { display: false } }
      }
    }
  });
}

function renderVolume(data) {
  const map = {};
  data.forEach(r => {
    const d = parseData(r[COLS.DATA_ATRIBUIDO]);
    if (!d) return;
    const key = d.toLocaleDateString('pt-BR');
    map[key] = (map[key]||0) + 1;
  });

  const entries = Object.entries(map).sort((a,b) => {
    const pa = a[0].split('/').reverse().join('');
    const pb = b[0].split('/').reverse().join('');
    return pa.localeCompare(pb);
  }).slice(-30);

  if (charts.vol) charts.vol.destroy();
  charts.vol = new Chart(document.getElementById('volChart'), {
    type: 'line',
    data: {
      labels: entries.map(([k]) => k),
      datasets: [{
        data: entries.map(([,v]) => v),
        borderColor: '#185FA5',
        backgroundColor: 'rgba(24,95,165,0.08)',
        borderWidth: 2,
        pointRadius: 3,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, ticks: { font:{size:11} }, grid: { color: '#f0f1f3' } },
        x: { ticks: { font:{size:10}, maxTicksLimit: 10 }, grid: { display: false } }
      }
    }
  });
}

function renderCRM(data) {
  const map = {};
  data.forEach(r => {
    const c = (r[COLS.CARD]||'').trim();
    if (!c || c === 'N/A' || c === '') return;
    map[c] = (map[c]||0) + 1;
  });
  const sorted = Object.entries(map).sort((a,b) => b[1]-a[1]).slice(0,8);
  const colors = ['#185FA5','#1D9E75','#534AB7','#BA7517','#D85A30','#E24B4A','#6b7280','#D4537E'];

  if (charts.crm) charts.crm.destroy();
  charts.crm = new Chart(document.getElementById('crmChart'), {
    type: 'bar',
    data: {
      labels: sorted.map(([k]) => k),
      datasets: [{
        data: sorted.map(([,v]) => v),
        backgroundColor: sorted.map((_,i) => colors[i%colors.length]),
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { font:{size:11} }, grid: { color: '#f0f1f3' } },
        y: { ticks: { font:{size:11} }, grid: { display: false } }
      }
    }
  });
}

function setStatus(type, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + type;
  txt.textContent = text;
}

// Parser CSV robusto
function parsearCSV(csv) {
  const resultado = [];
  let linha = [], campo = '', aspas = false;
  for (let i = 0; i < csv.length; i++) {
    const c = csv[i], prox = csv[i+1];
    if (c === '"') {
      if (aspas && prox === '"') { campo += '"'; i++; }
      else aspas = !aspas;
    } else if (c === ',' && !aspas) {
      linha.push(campo); campo = '';
    } else if ((c === '\n' || (c === '\r' && prox === '\n')) && !aspas) {
      if (c === '\r') i++;
      linha.push(campo); resultado.push(linha); linha = []; campo = '';
    } else campo += c;
  }
  if (campo || linha.length) { linha.push(campo); resultado.push(linha); }
  return resultado.filter(l => l.some(c => (c||'').trim() !== ''));
}

// Inicia
carregarDados();
